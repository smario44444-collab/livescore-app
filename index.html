        */

            padding-bottom: 80px; 
            overflow-x: hidden; 
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }

        .app-header { 
            position: sticky; 
            top: 0px; 
            z-index: 100; 
            background-color: rgba(5, 5, 5, 0.95); 
            backdrop-filter: blur(20px); 
            border-bottom-width: 1px;
            border-bottom-style: solid;
            border-bottom-color: #1f1f23; 
        }
        
        .header-inner {
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            padding-top: 16px;
            padding-bottom: 16px;
            padding-left: 16px;
            padding-right: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .header-title {
            font-size: 19px;
            font-weight: 900;
            font-style: italic;
            letter-spacing: -0.05em;
            color: #ffffff;
            line-height: 1;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-title span {
            color: #fbbf24; 
        }
        
        .yt-link {
            text-decoration: none;
            color: inherit;
            background: linear-gradient(180deg, #1f1f23 0%, #121214 100%);
            padding: 5px 12px;
            border-radius: 8px;
            border: 1px solid #27272a;
            transition-property: all;
            transition-duration: 0.2s;
            cursor: pointer;
            display: inline-block;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
        }

        .yt-link:hover {
            border-color: #fbbf24;
            transform: translateY(-2px);
        }
        
        .ampersand {
            color: #52525b;
            font-size: 14px;
            font-style: normal;
        }

        .header-subtitle {
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            display: flex;
            align-items: center;
            padding-left: 2px;
            transition: color 0.3s;
        }
        
        .header-subtitle .live-indicator {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse-dot 1.5s infinite;
        }

        .header-buttons {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-fav-team {
            background-color: #18181b;
            color: #fbbf24;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 1px solid #27272a;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-fav-team:active {
            transform: scale(0.9);
        }

        .btn-scorer-toggle {
            background-color: #fbbf24;
            color: #000000;
            font-size: 11px;
            font-weight: 900;
            padding-top: 10px;
            padding-bottom: 10px;
            padding-left: 20px;
            padding-right: 20px;
            border-radius: 9999px;
            text-transform: uppercase;
            box-shadow: 0px 10px 15px -3px rgba(0, 0, 0, 0.2);
            transition-property: all;
            transition-duration: 0.2s;
            cursor: pointer;
            border: none;
        }

        .btn-scorer-toggle:active {
            transform: scale(0.95);
        }

        .tabs-scroll {
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            padding-left: 8px;
            padding-right: 8px;
            display: flex;
            overflow-x: auto;
            gap: 4px;
        }

            padding-bottom: 14px;
            padding-left: 20px;
            padding-right: 20px;
            font-size: 13px; 
            font-weight: 800;

            border-bottom-style: solid;
            border-bottom-color: transparent; 
            transition-property: all;
            transition-duration: 0.2s;
            text-transform: uppercase;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
        }
        
        .league-pill.active {

        }

            border-bottom-width: 1px;
            border-bottom-style: solid;
            border-bottom-color: #1f1f23;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;

            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #52525b;
            text-align: center;

            border-bottom-style: solid;
            border-bottom-color: #1f1f23; 
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;

            height: 44px;

            border: none;

            text-transform: uppercase; 
            letter-spacing: 1.5px;

            text-align: center;

        }

            50% { opacity: 0.3; }

        /* API HELPER */
        async function api(url) {
            try { 
                const response = await fetch(url); 
                if (response.ok === true) return await response.json();
                return [];
            } catch (error) { 
                console.error("API Fehler:", error);
                return [];

        }

        /* LOGO & TEAM ID HELPER */
        function getTeamId(name) {
            const keys = Object.keys(teamLogos).sort(function(a, b) { return b.length - a.length; });
            const foundKey = keys.find(function(key) { return name.toLowerCase().includes(key.toLowerCase()); });
            return foundKey ? teamLogos[foundKey] : null;
        }

        function resolveLogo(name) {
            const id = getTeamId(name);
            return id ? "https://tmssl.akamaized.net/images/wappen/head/" + id + ".png" : "https://ui-avatars.com/api/?name=" + encodeURIComponent(name) + "&background=111&color=444&bold=true";
        }

        /* GREEN-TEAM PRÜFUNG (MULTI-TEAMS) */
        function isSpecialGreenTeam(teamName) {
            if (!teamName || favoriteTeams.length === 0) return false;
            const tId = getTeamId(teamName);
            if (!tId) return false;
            return favoriteTeams.some(function(fav) { return getTeamId(fav) === tId; });
        }

        /* TEAM SELECTION & PUSH PERMISSION */
        function openFavModal() {

                    const isChecked = favoriteTeams.includes(team) ? 'checked' : '';
                    html += `

            const checkboxes = document.querySelectorAll('.team-checkbox:checked');
            favoriteTeams = Array.from(checkboxes).map(function(cb) { return cb.value; });
            localStorage.setItem('smario_fav_teams', JSON.stringify(favoriteTeams));
            document.getElementById('fav-modal-overlay').classList.remove('open');
            
            // PUSH PERMISSION ANFRAGEN (Einmalig im Browser)
            if ("Notification" in window && Notification.permission !== "granted" && Notification.permission !== "denied") {
                Notification.requestPermission();
            }
            
            refreshView(); 
        }

        /* DYNAMISCHER HEADER */
        function updateHeaderStatus(matches) {
            const headerStatus = document.getElementById('header-status');
            let isAnyMatchLive = false;
            let isFavMatchLive = false;

            matches.forEach(function(m) {
                const now = new Date();
                const matchTime = new Date(m.matchDateTimeUTC);
                const isLive = now > matchTime && !m.matchIsFinished;
                
                if (isLive) {
                    isAnyMatchLive = true;
                    if (isSpecialGreenTeam(m.team1.teamName) || isSpecialGreenTeam(m.team2.teamName)) {
                        isFavMatchLive = true;
                    }
                }
            });

            if (isFavMatchLive) {
                headerStatus.innerHTML = `<span class="live-indicator" style="background-color: #10b981;"></span><span style="color: #10b981;">DEIN TEAM SPIELT!</span>`;
            } else if (isAnyMatchLive) {
                headerStatus.innerHTML = `<span class="live-indicator"></span><span style="color: #ef4444;">LIVE MATCHES AKTIV</span>`;
            } else {
                headerStatus.innerHTML = `<span style="color: #71717a;">Live Scores App</span>`;
            }
        }

        /* PUSH NOTIFICATION ENGINE (IN-APP) */
        function checkAndNotify(matches) {
            if (!("Notification" in window) || Notification.permission !== "granted") return;

            matches.forEach(function(m) {
                const matchId = m.matchID;
                const currentGoalCount = m.goals ? m.goals.length : 0;
                const now = new Date();
                const isLive = now > new Date(m.matchDateTimeUTC) && !m.matchIsFinished;
                
                const t1 = m.team1.shortName || m.team1.teamName;
                const t2 = m.team2.shortName || m.team2.teamName;
                const isFav = isSpecialGreenTeam(m.team1.teamName) || isSpecialGreenTeam(m.team2.teamName);

                // Anti-Spam: Benachrichtige nur bei Favoriten (falls welche gewählt). 
                // Wenn gar keine gewählt sind, bei allen Live-Spielen im aktuellen Tab.
                if (favoriteTeams.length > 0 && !isFav) return;

                if (knownMatchStates[matchId]) {
                    const prev = knownMatchStates[matchId];

                    // Check Anpfiff
                    if (!prev.isLive && isLive && !m.matchIsFinished) {
                        new Notification("⚽ Anpfiff!", { 
                            body: `Das Spiel ${t1} gegen ${t2} hat begonnen!`
                        });
                    }

                    // Check Tore
                    if (currentGoalCount > prev.goals) {
                        const latestGoal = m.goals[currentGoalCount - 1];
                        const scorer = latestGoal.goalGetterName;
                        const score = `${latestGoal.scoreTeam1}:${latestGoal.scoreTeam2}`;
                        new Notification("🚨 TOR!", { 
                            body: `${score} durch ${scorer} (${t1} vs ${t2})` 
                        });
                    }
                }

                // Update State
                knownMatchStates[matchId] = {
                    goals: currentGoalCount,
                    isLive: isLive
                };
            });
        }

        /* INITIALISIERUNG */
        async function initApp() {
            if (!localStorage.getItem('smario_fav_teams_asked')) {
                localStorage.setItem('smario_fav_teams_asked', 'true');
                openFavModal();
            }

            const groups = await api("https://api.openligadb.de/getavailablegroups/" + activeLeague + "/2025");
            groupList = groups;
            const current = await api("https://api.openligadb.de/getcurrentgroup/" + activeLeague);
            const findIdx = groupList.findIndex(function(g) { return g.groupOrderID === current.groupOrderID; });
            groupIdx = findIdx < 0 ? groupList.length - 1 : findIdx;
            
            refreshView();
        }

        function refreshView() {
            const navContainer = document.getElementById('nav-container');
            const btnTable = document.getElementById('btn-table');

            if (activeLeague === 'dfb') btnTable.innerText = 'RUNDEN';
            else btnTable.innerText = 'TABELLE';

            if (activeView === 'matches') {
                navContainer.style.display = 'flex';
                loadMatches();
            } else {
                navContainer.style.display = 'none';
                loadTable();
            }
        }

        function formatPlayerName(fullName) {
            const parts = fullName.split(' ');
            if (parts.length > 1) return parts[0].charAt(0) + '. ' + parts.slice(1).join(' ');
            return fullName;
        }

        /* SPIELE LADEN */
        async function loadMatches() {
            const mainElement = document.getElementById('main-content');
            if (groupList[groupIdx] === undefined) return;
            
            const currentGroup = groupList[groupIdx];
            document.getElementById('day-label').innerText = currentGroup.groupName;
            
            const matchData = await api("https://api.openligadb.de/getmatchdata/" + activeLeague + "/2025/" + currentGroup.groupOrderID);
            currentMatchList = matchData;
            
            updateHeaderStatus(matchData);
            checkAndNotify(matchData);
            
            if (matchData.length === 0) {
                mainElement.innerHTML = '<div class="py-32 text-center text-zinc-500 font-bold uppercase text-xs">Keine Spiele gefunden</div>';
                return;
            }
            
            const htmlMatches = matchData.map(function(m) {
                const now = new Date();
                const matchTime = new Date(m.matchDateTimeUTC);
                const isLive = now > matchTime && m.matchIsFinished === false;
                
                let pts1 = "-";
                let pts2 = "-";
                if (m.matchResults && m.matchResults.length > 0) {
                    const finalRes = m.matchResults.find(function(r) { return r.resultTypeID === 2; }) || m.matchResults[0];
                    pts1 = finalRes.pointsTeam1;
                    pts2 = finalRes.pointsTeam2;
                } else if (isLive || m.matchIsFinished) {
                    pts1 = "0";
                    pts2 = "0";
                }

                let statusBoxHtml = '';
                if (m.matchIsFinished) {
                    statusBoxHtml = 'ENDE';
                } else if (isLive) {
                    let diffMins = Math.floor((now - matchTime) / 60000);
                    let displayMin = diffMins;
                    if (diffMins < 0) displayMin = 0;
                    if (diffMins > 45 && diffMins <= 60) displayMin = 'HT';
                    else if (diffMins > 60) displayMin = (diffMins - 15);
                    if (displayMin > 90 && displayMin !== 'HT') displayMin = '90+';
                    
                    statusBoxHtml = `
                        <div class="flex flex-col items-center justify-center gap-[2px]">
                            <span class="live-dot text-red-500 font-black text-[9px] tracking-widest">LIVE</span>
                            <span class="text-yellow-500 font-black text-[11px]">${displayMin === 'HT' ? 'HT' : displayMin + "'"}</span>
                        </div>`;
                } else {
                    statusBoxHtml = m.matchDateTimeUTC.split('T')[1].substring(0,5);
                }
                
                let goalsHtml = "";
                if (m.goals && m.goals.length > 0) {
                    let homeGoals = [];
                    let awayGoals = [];
                    let sortedGoals = [...m.goals].sort((a, b) => a.goalID - b.goalID);

                    sortedGoals.forEach(function(g) {

                        if (g.scoreTeam1 > prevS1) isHomeGoal = true;

                            </div>

                            </div>

                            </div>
                        </div>
                        ${goalsHtml}

            });

                                        <img src="${resolveLogo(m.team1.teamName)}" class="team-logo" style="${t1Glow}">
                                    </div>
                                    <div class="score-display ${isLive ? 'text-yellow-500' : ''}">${pts1}:${pts2}</div>
                                    <div class="team-box away">
                                        <img src="${resolveLogo(m.team2.teamName)}" class="team-logo" style="${t2Glow}">
                                        <span class="team-name" style="${t2Color}">${t2Name}</span>
                                    </div>
                                </div>
                                ${goalsHtml}
                            </div>`;
                    });
                    roundsHtml += matchCards.join('');
                });
                
                mainElement.innerHTML = roundsHtml;
                return;
            }

            mainElement.innerHTML = '<div class="py-32 text-center text-zinc-800 font-black animate-pulse uppercase tracking-widest text-sm">Lade Tabelle...</div>';
            
            // Lade Matches für die Live-Minute in der Tabelle UND für Push
            let liveTeamsDict = {};
            let currentGroupData = groupList[groupIdx];
            if (currentGroupData) {
                const mData = await api("https://api.openligadb.de/getmatchdata/" + activeLeague + "/2025/" + currentGroupData.groupOrderID);
                updateHeaderStatus(mData);
                checkAndNotify(mData);

                mData.forEach(function(m) {
                    const now = new Date();
                    const matchTime = new Date(m.matchDateTimeUTC);
                    const isLive = now > matchTime && !m.matchIsFinished;
                    if(isLive) {
                        let diffMins = Math.floor((now - matchTime) / 60000);
                        let displayMin = diffMins;
                        if (diffMins < 0) displayMin = 0;
                        if (diffMins > 45 && diffMins <= 60) displayMin = 'HT';
                        else if (diffMins > 60) displayMin = (diffMins - 15);
                        if (displayMin > 90 && displayMin !== 'HT') displayMin = '90+';
                        
                        let liveStr = `<span class="ml-2 flex items-center gap-1 text-[9px] font-black px-1.5 py-0.5 rounded bg-red-500/10 text-red-500 border border-red-500/20"><span class="live-dot w-1.5 h-1.5 bg-red-500 rounded-full"></span>${displayMin === 'HT' ? 'HT' : displayMin + "'"}</span>`;
                        
                        liveTeamsDict[m.team1.teamName] = liveStr;
                        liveTeamsDict[m.team2.teamName] = liveStr;
                    }
                });
            }

            const tableData = await api("https://api.openligadb.de/getbltable/" + activeLeague + "/2025");
            
            let tableHtml = '<div style="max-width: 800px; margin: 0 auto; background: #0f0f12; width: 100%; overflow-x: auto;">';
            tableHtml += '<table style="width: 100%; border-collapse: collapse; table-layout: fixed; min-width: 320px;">';
            tableHtml += '<thead style="background-color: #0c0c0e;"><tr>';
            tableHtml += '<th style="width: 35px; padding: 12px 4px; text-align: center; color: #71717a; font-weight: 900; font-size: 10px; text-transform: uppercase; border-bottom: 2px solid #1f1f23;">#</th>';
            tableHtml += '<th style="padding: 12px 8px; text-align: left; color: #71717a; font-weight: 900; font-size: 10px; text-transform: uppercase; border-bottom: 2px solid #1f1f23;">Verein</th>';
            tableHtml += '<th style="width: 35px; padding: 12px 4px; text-align: center; color: #71717a; font-weight: 900; font-size: 10px; text-transform: uppercase; border-bottom: 2px solid #1f1f23;">Sp.</th>';
            tableHtml += '<th style="width: 40px; padding: 12px 4px; text-align: center; color: #71717a; font-weight: 900; font-size: 10px; text-transform: uppercase; border-bottom: 2px solid #1f1f23;">Diff</th>';
            tableHtml += '<th style="width: 45px; padding: 12px 8px 12px 4px; text-align: right; color: #71717a; font-weight: 900; font-size: 10px; text-transform: uppercase; border-bottom: 2px solid #1f1f23;">Pkt</th>';
            tableHtml += '</tr></thead><tbody>';
            
            const rows = tableData.map(function(t, i) {
                const rank = i + 1;
                const teamName = t.teamName;
                const shortName = t.shortName || teamName;
                
                let zoneColor = "transparent";
                if (activeLeague === 'bl1') {
                    if (rank <= 4) zoneColor = "#fbbf24";
                    else if (rank === 5 || rank === 6) zoneColor = "#10b981";
                    else if (rank === 16) zoneColor = "#f97316";
                    else if (rank >= 17) zoneColor = "#ef4444";
                } else if (activeLeague === 'bl2') {
                    if (rank <= 2) zoneColor = "#10b981";
                    else if (rank === 3) zoneColor = "#fbbf24";
                    else if (rank === 16) zoneColor = "#f97316";
                    else if (rank >= 17) zoneColor = "#ef4444";
                } else if (activeLeague === 'bl3') {
                    if (rank <= 2) zoneColor = "#10b981";
                    else if (rank === 3) zoneColor = "#fbbf24";
                    else if (rank >= 17) zoneColor = "#ef4444";
                }

                let bgColor = (i % 2 === 0 ? 'transparent' : 'rgba(255,255,255,0.015)');
                let nameColor = "#fafafa"; 
                let nameWeight = "700";
                let logoGlow = "";

                if (isSpecialGreenTeam(teamName) === true) {
                    bgColor = "linear-gradient(90deg, rgba(16,185,129,0.15) 0%, rgba(15,15,18,1) 100%)";
                    nameColor = "#10b981"; 
                    nameWeight = "900";
                    logoGlow = "drop-shadow(0 0 6px rgba(16,185,129,0.7))";
                }

                let liveBadge = liveTeamsDict[teamName] || "";

                let rowHtml = `<tr style="background: ${bgColor}; border-bottom: 1px solid #1f1f23;">`;
                rowHtml += `<td style="padding: 12px 4px; text-align: center; font-weight: 900; font-size: 12px; color: ${zoneColor === 'transparent' ? '#71717a' : zoneColor}; border-left: 4px solid ${zoneColor};">${rank}</td>`;
                rowHtml += `<td style="padding: 12px 8px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;">`;
                rowHtml += `<div style="display: flex; align-items: center; gap: 10px;">`;
                rowHtml += `<img src="${resolveLogo(teamName)}" style="width: 24px; height: 24px; object-fit: contain; flex-shrink: 0; filter: ${logoGlow};">`;
                rowHtml += `<span style="font-weight: ${nameWeight}; font-size: 14px; color: ${nameColor}; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center;">${shortName}${liveBadge}</span>`;
                rowHtml += `</div></td>`;
                rowHtml += `<td style="padding: 12px 4px; text-align: center; color: #a1a1aa; font-size: 13px; font-variant-numeric: tabular-nums;">${t.matches}</td>`;
                rowHtml += `<td style="padding: 12px 4px; text-align: center; color: #71717a; font-size: 13px; font-variant-numeric: tabular-nums;">${t.goalDiff}</td>`;
                rowHtml += `<td style="padding: 12px 8px 12px 4px; text-align: right; font-weight: 900; color: #fbbf24; font-size: 15px;">${t.points}</td>`;
                rowHtml += `</tr>`;
                
                return rowHtml;
            });
            
            tableHtml += rows.join('');
            tableHtml += '</tbody></table></div>';
            
            mainElement.innerHTML = tableHtml;
        }

        /* ============================================================
           MATCH DETAILS MODAL
           ============================================================ 
        */
        function openMatchDetails(matchId) {
            const match = currentMatchList.find(function(m) { return m.matchID === matchId; });
            if (!match) return;

            const t1Name = match.team1.shortName || match.team1.teamName;
            const t2Name = match.team2.shortName || match.team2.teamName;
            
            let goalsHtml = '<div class="text-zinc-500 text-sm italic mb-4 text-center">Bisher keine Tore.</div>';
            if (match.goals && match.goals.length > 0) {
                let currentHomeScore = 0;
                let sortedGoals = [...match.goals].sort((a, b) => a.goalID - b.goalID);
                
                const goalItems = sortedGoals.map(function(g) {
                    const isHomeGoal = g.scoreTeam1 > currentHomeScore;
                    currentHomeScore = g.scoreTeam1;
                    let shortName = formatPlayerName(g.goalGetterName);
                    
                    if (isHomeGoal) {
                        return `
                        <div class="flex justify-start items-center border-b border-zinc-800 py-3 text-sm w-full">
                            <span class="font-black text-yellow-500 w-8">${g.matchMinute}'</span>
                            <span class="text-zinc-200 font-bold">${shortName}</span>
                        </div>`;
                    } else {
                        return `
                        <div class="flex justify-end items-center border-b border-zinc-800 py-3 text-sm w-full">
                            <span class="text-zinc-200 font-bold">${shortName}</span>
                            <span class="font-black text-yellow-500 w-8 text-right">${g.matchMinute}'</span>
                        </div>`;
                    }
                });
                goalsHtml = `<div class="mb-6"><h3 class="text-xs font-black uppercase text-zinc-500 mb-2 tracking-widest text-center">Match Timeline</h3>${goalItems.join('')}</div>`;
            }

            const now = new Date();
            const matchTime = new Date(match.matchDateTimeUTC);
            const isLive = now > matchTime && match.matchIsFinished === false;

            let pts1 = "-";
            let pts2 = "-";
            if (match.matchResults && match.matchResults.length > 0) {
                const finalRes = match.matchResults.find(function(r) { return r.resultTypeID === 2; }) || match.matchResults[0];
                pts1 = finalRes.pointsTeam1;
                pts2 = finalRes.pointsTeam2;
            } else if (isLive || match.matchIsFinished) {
                pts1 = "0";
                pts2 = "0";
            }

            let liveBadgeModal = "";
            if (isLive) {
                let diffMins = Math.floor((now - matchTime) / 60000);
                let displayMin = diffMins;
                if (diffMins < 0) displayMin = 0;
                if (diffMins > 45 && diffMins <= 60) displayMin = 'HT';
                else if (diffMins > 60) displayMin = (diffMins - 15);
                if (displayMin > 90 && displayMin !== 'HT') displayMin = '90+';
                
                liveBadgeModal = `<div class="text-red-500 font-black text-[10px] tracking-widest flex items-center justify-center gap-1 mb-1"><span class="live-dot w-1.5 h-1.5 bg-red-500 rounded-full"></span>LIVE ${displayMin === 'HT' ? 'HT' : displayMin + "'"}</div>`;
            }

            const query = encodeURIComponent(`${t1Name} gegen ${t2Name}`);
            const newsLink = `https://news.google.com/search?q=${query}+fussball`;
            const lineupLink = `https://www.google.com/search?q=${query}+aufstellung`;

            const buttonsHtml = `
                <div class="flex gap-4 mt-auto pt-4 border-t border-zinc-800">
                    <a href="${lineupLink}" target="_blank" class="flex-1 bg-zinc-800 hover:bg-zinc-700 text-center py-4 rounded-xl font-black text-[11px] uppercase tracking-widest transition-colors text-white text-decoration-none shadow-lg">Aufstellung</a>
                    <a href="${newsLink}" target="_blank" class="flex-1 bg-yellow-500 hover:bg-yellow-400 text-center py-4 rounded-xl font-black text-[11px] uppercase tracking-widest transition-colors text-black text-decoration-none shadow-lg">Live News</a>
                </div>
            `;

            const headerHtml = `
                <div class="flex justify-center items-center gap-4 mb-8 pt-4">
                    <div class="text-center flex-1">
                        <img src="${resolveLogo(match.team1.teamName)}" class="w-16 h-16 mx-auto mb-3 object-contain filter drop-shadow-md">
                        <div class="font-bold text-xs uppercase text-zinc-400 tracking-wider">${t1Name}</div>
                    </div>
                    <div class="flex flex-col justify-center items-center w-24">
                        ${liveBadgeModal}
                        <div class="text-5xl font-black text-center tracking-tighter ${isLive ? 'text-yellow-500' : 'text-white'}">
                            ${pts1}:${pts2}
                        </div>
                    </div>
                    <div class="text-center flex-1">
                        <img src="${resolveLogo(match.team2.teamName)}" class="w-16 h-16 mx-auto mb-3 object-contain filter drop-shadow-md">
                        <div class="font-bold text-xs uppercase text-zinc-400 tracking-wider">${t2Name}</div>
                    </div>
                </div>
            `;

            document.getElementById('match-modal-body').innerHTML = headerHtml + goalsHtml + buttonsHtml;
            document.getElementById('match-modal-overlay').classList.add('open');
        }

        function closeMatchDetails() {
            document.getElementById('match-modal-overlay').classList.remove('open');
        }

        /* ============================================================
           TORJÄGER LOGIK
           ============================================================ 
        */
        async function toggleScorers(show) {
            const modal = document.getElementById('modal-overlay');
            const dataBox = document.getElementById('scorer-data');
            
            if (show === false) {
                modal.classList.remove('open');
                return;
            }
            
            modal.classList.add('open');
            dataBox.innerHTML = '<div class="py-20 text-center text-zinc-500 font-black animate-pulse uppercase">Syncing Scorers...</div>';
            
            const apiScorers = await api("https://api.openligadb.de/getgoalgetters/" + activeLeague + "/2025");

            let manualList = [];
            if (activeLeague === 'bl1') manualList = bundesligaScorersManual;
            else if (activeLeague === 'bl2') manualList = bundesliga2ScorersManual;
            else if (activeLeague === 'bl3') manualList = liga3ScorersManual;
            else if (activeLeague === 'dfb') manualList = dfbScorersManual; 

            if (activeLeague === 'bl1' || activeLeague === 'bl2' || activeLeague === 'bl3' || activeLeague === 'dfb') {
                let finalScorers = manualList.map(function(s) {
                    const apiMatch = apiScorers.find(function(a) {
                        return a.goalGetterName.includes(s.name.split(' ')[1]) || a.goalGetterName.includes(s.name);
                    });
                    
                    const currentGoals = apiMatch ? Math.max(s.goals, apiMatch.goalCount) : s.goals;
                    
                    let playerImg = "https://ui-avatars.com/api/?name=" + encodeURIComponent(s.name) + "&background=fbbf24&color=000&bold=true";
                    const knownNames = Object.keys(knownPlayerImages);
                    for (let k = 0; k < knownNames.length; k++) {
                        if (s.name === knownNames[k]) {
                            playerImg = knownPlayerImages[knownNames[k]];
                            break;
                        }
                    }
                    
                    return {
                        name: s.name,
                        pos: s.pos,
                        goals: currentGoals,
                        img: playerImg
                    };
                });
                
                finalScorers.sort(function(a, b) {
                    if (b.goals !== a.goals) {
                        return b.goals - a.goals;
                    } else {
                        const indexA = manualList.findIndex(function(s) { return s.name === a.name; });
                        const indexB = manualList.findIndex(function(s) { return s.name === b.name; });
                        return indexA - indexB;
                    }
                });

                if (activeLeague !== 'bl1') {
                    finalScorers = finalScorers.slice(0, 5);
                }

                dataBox.innerHTML = finalScorers.map(function(s, i) {
                    return `
                    <div class="scorer-row shadow-lg">
                        <div class="w-8 font-black text-zinc-800 text-lg">${i+1}</div>
                        <img src="${s.img}" class="scorer-img shadow-md">
                        <div class="flex-1 ml-4">
                            <div class="font-bold text-zinc-100 text-sm">${s.name}</div>
                            <div class="text-[9px] text-zinc-500 font-black uppercase tracking-widest">${activeLeague === 'dfb' ? 'DFB-POKAL' : s.pos}</div>
                        </div>
                        <div class="text-xl font-black text-yellow-500">${s.goals}</div>
                    </div>`;
                }).join('');
            }
        }

        /* VIEW SWITCHER */
        function setView(view) {
            activeView = view;
            const btnMatches = document.getElementById('btn-matches');
            const btnTable = document.getElementById('btn-table');
            
            if (view === 'matches') {
                btnMatches.classList.add('active');
                btnTable.classList.remove('active');
            } else {
                btnMatches.classList.remove('active');
                btnTable.classList.add('active');
            }
            refreshView();
        }

        /* LIGEN SWITCHER */
        function switchLeague(id, name, btn) {
            activeLeague = id;
            activeLeagueName = name;
            
            const allPills = document.querySelectorAll('.league-pill');
            allPills.forEach(function(p) { p.classList.remove('active'); });
            btn.classList.add('active');
            initApp();
        }

        /* SPIELTAGS SWITCHER */
        function changeDay(n) {
            const nextIdx = groupIdx + n;
            if (nextIdx >= 0 && nextIdx < groupList.length) {
                groupIdx = nextIdx;
                loadMatches();
            }
        }

        /* START APP */
        initApp();
        
        /* Auto-Reload für Matches und Notifications */
        setInterval(function() {
            if (activeView === 'matches' || activeView === 'table') {
                refreshView();
            }
        }, 60000);

    </script>
</body>
</html>
